{%- capture github %}https://github.com/{{ page.old }}{% endcapture -%}
{%- assign redirect = page.redirect -%}
{%- unless redirect -%}
	{%- assign redirect = github -%}
{%- endunless -%}
<!DOCTYPE html>
<html>
	<head>
		<meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
		<meta name="go-import" content="{{ page.new }} git {{ github }}">
		<meta name="go-source" content="{{ page.new }} {{ redirect }} {{ github }}/tree/main{/dir} {{ github }}/blob/main{/dir}/{file}#L{line}">
		<meta http-equiv="refresh" content="0; url={{ redirect }}">
	</head>
	<body>
		Nothing to see here; <a href="{{ redirect }}">move along</a>.
	</body>
</html>
